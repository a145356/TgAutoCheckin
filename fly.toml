# Fly.io deployment configuration
app = "telegram-checkin"
primary_region = "sin"  # Singapore region

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# Persistent storage for session files
[mounts]
  source = "telegram_session"
  destination = "/app/session"
  initial_size = "1gb"

[mounts]
  source = "telegram_logs"
  destination = "/app/logs"
  initial_size = "1gb"

# Auto-restart configuration
[processes]
  app = "python -u src/main.py"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.http_checks]]
    interval = "60s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
